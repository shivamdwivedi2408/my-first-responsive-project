<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Defined Table Generator</title>
  <style>
    body {
      font-family: Arial;
      background: #f1f8e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #388e3c;
    }
    ul {
      list-style: none;
      padding: 0;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Table Generator</h2>
    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="showTable()">Show Table</button>
    <ul id="result"></ul>
  </div>

  <script>
    // ---- User-defined function to create table ----
    function generateTable(n) {
      let table = [];
      for (let i = 1; i <= 10; i++) {
        table.push(`${n} × ${i} = ${n * i}`);
      }
      return table;
    }

    // Function to display the table
    function showTable() {
      let num = parseInt(document.getElementById("num").value);
      let resultArea = document.getElementById("result");
      resultArea.innerHTML = "";

      if (isNaN(num)) {
        resultArea.innerHTML = "<li>Please enter a valid number!</li>";
        return;
      }

      // Call user-defined function
      let table = generateTable(num);

      // Display each line of the table
      for (let i = 0; i < table.length; i++) {
        let li = document.createElement("li");
        li.textContent = table[i];
        resultArea.appendChild(li);
      }
    }
  </script>
</body>
</html>
