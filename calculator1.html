<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Defined Simple Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .calc-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 300px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    h2 { text-align: center; }
  </style>
</head>
<body>
  <div class="calc-box">
    <h2>Simple Calculator</h2>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <select id="operator">
      <option value="add">Addition (+)</option>
      <option value="sub">Subtraction (-)</option>
      <option value="mul">Multiplication (×)</option>
      <option value="div">Division (÷)</option>
    </select>
    <button onclick="calculate()">Calculate</button>
    <h3 id="result">Result: </h3>
  </div>

  <script>
    // ---- User defined functions ----
    function add(a, b) {
      return a + b;
    }

    function subtract(a, b) {
      return a - b;
    }

    function multiply(a, b) {
      return a * b;
    }

    function divide(a, b) {
      if (b === 0) return "Error! Division by zero.";
      return a / b;
    }

    // Main function to perform operation
    function calculate() {
      let num1 = parseFloat(document.getElementById("num1").value);
      let num2 = parseFloat(document.getElementById("num2").value);
      let operator = document.getElementById("operator").value;
      let result;

      // Calling user-defined functions
      if (operator === "add") result = add(num1, num2);
      else if (operator === "sub") result = subtract(num1, num2);
      else if (operator === "mul") result = multiply(num1, num2);
      else if (operator === "div") result = divide(num1, num2);
      else result = "Invalid Operation";

      document.getElementById("result").innerText = "Result: " + result;
    }
  </script>
</body>
</html>
