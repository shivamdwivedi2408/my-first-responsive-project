<!DOCTYPE html>
<head>
    <title>Character Counter Tool</title>

    <!--  CSS Styling -->
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #ffdd57;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        .counter-box {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 10px;
        }

        .count {
            font-size: 18px;
        }

        footer {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Character Counter </h1>

        <textarea id="textInput" placeholder="Start typing here..."></textarea>

        <div class="counter-box">
            <span class="count">Characters: <strong id="charCount">0</strong></span>
            <span class="count">Words: <strong id="wordCount">0</strong></span>
        </div>

        <footer>Created by Shivam Dwivedi | Project</footer>
    </div>

    <!--  JavaScript Code -->
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');

        textInput.addEventListener('input', () => {
            let text = textInput.value;
            charCount.textContent = text.length;

            // Trim spaces and split for words
            let words = text.trim().split(/\s+/);
            let wordNum = text.trim() === "" ? 0 : words.length;

            wordCount.textContent = wordNum;
        });
    </script>
</body>
</html>
